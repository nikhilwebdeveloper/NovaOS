<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NovaOS Prototype</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Top Panel -->

    <header class="panel">

        <div class="panel-left">

            <span class="logo">NovaOS</span>

        </div>

        <div class="panel-right">

            <span>WiFi</span>

            <span>🔊</span>

            <span>🔋</span>

            <span id="clock">12:00</span>

        </div>

    </header>

    <!-- Desktop -->

    <main class="desktop">

        <h1>Welcome to NovaOS</h1>

        <p>Power Without Weight</p>

    </main>

    <!-- Dock -->

    <footer class="dock">

        <button>Files</button>

        <button>Browser</button>

        <button>Store</button>

        <button>Settings</button>

        <button>Terminal</button>

    </footer>

    <script src="script.js"></script>

</body>

</html>
